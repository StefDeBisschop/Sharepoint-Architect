<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SharePoint Architect</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- Topbar -->
      <header id="topbar">
        <div class="brand">
          <div class="brand-mark" data-icon="box"></div>
          <div class="brand-text">
            <span class="brand-sub">SharePoint Architect</span>
            <input id="doc-name" class="doc-name" value="Untitled architecture" />
          </div>
        </div>
        <div class="toolbar">
          <button class="tool" data-action="undo" title="Undo (Ctrl+Z)"><span data-icon="undo"></span>Undo</button>
          <button class="tool" data-action="redo" title="Redo (Ctrl+Shift+Z)"><span data-icon="redo"></span>Redo</button>
          <button class="tool" data-action="tidy" title="Tidy layout"><span data-icon="wand"></span>Tidy</button>
          <span class="sep"></span>
          <button class="tool" data-action="sample" title="Load sample"><span data-icon="refresh"></span>Sample</button>
          <button class="tool" data-action="import"><span data-icon="upload"></span>Import</button>
          <button class="tool" data-action="export-json"><span data-icon="download"></span>JSON</button>
          <button class="tool primary" data-action="export-png"><span data-icon="image"></span>PNG</button>
          <span class="sep"></span>
          <button class="tool icon-only" data-action="settings" title="Settings"><span data-icon="settings"></span></button>
          <input id="file-input" type="file" accept="application/json" hidden />
        </div>
      </header>

      <div id="main">
        <!-- Sidebar palette -->
        <aside id="sidebar">
          <div class="panel-head">
            <h2>Building blocks</h2>
            <p>Drag onto the canvas</p>
            <p class="hint">A Team Site can be Teams-connected from the Inspector.</p>
          </div>
          <div id="palette"></div>
        </aside>

        <!-- Canvas -->
        <main id="canvas">
          <div id="viewport">
            <div id="frames"></div>
            <svg id="edges" xmlns="http://www.w3.org/2000/svg"></svg>
            <div id="nodes"></div>
            <div id="annotations"></div>
          </div>
          <svg id="connect-layer"><path id="connect-path" /></svg>
          <div id="controls">
            <button data-action="zoom-in" title="Zoom in">+</button>
            <button data-action="zoom-out" title="Zoom out">&minus;</button>
            <button data-action="fit" title="Fit to view"><span data-icon="maximize"></span></button>
          </div>
          <div id="minimap"><svg id="minimap-svg"></svg></div>
        </main>

        <!-- Inspector -->
        <aside id="inspector"></aside>
      </div>
    </div>

    <div id="contextmenu" hidden></div>

    <script src="app.js"></script>
  </body>
</html>
